name: cocotb regressions

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cocotb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.10"

      - name: Install Verilator build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git autoconf flex bison help2man perl python3 libfl-dev

      - name: Get Verilator stable commit SHA
        id: verilator-sha
        run: |
          SHA=$(git ls-remote --tags https://github.com/verilator/verilator.git | grep v5.024 | cut -f1 | tail -n 1)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Cache Verilator build
        id: verilator-cache
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/verilator*
            /usr/local/share/verilator
          key: verilator-${{ steps.verilator-sha.outputs.sha }}

      - name: Build and install Verilator from source
        if: steps.verilator-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/verilator/verilator.git
          cd verilator
          git checkout v5.024
          autoconf
          ./configure
          make -j$(nproc)
          sudo make install

      - name: Install Python package
        run: uv sync --extra dev

      - name: Run cocotb tests (CSR)
        run: |
          cd tests/regressions
          make rtl
          make test

      - name: Run cocotb tests (AXI Lite)
        run: |
          cd tests/regressions
          make rtl CPUIF=axi-lite
          make test CPUIF=axi-lite
